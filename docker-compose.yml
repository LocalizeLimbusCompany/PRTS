services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["prts-api"]
    env_file:
      - .env
    ports:
      - "18080:18080"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["prts-worker"]
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: prts_translation_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "15432:5432"
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    ports:
      - "16379:6379"
    volumes:
      - ./docker-data/redis:/data

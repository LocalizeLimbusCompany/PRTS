name: deploy

on:
  push:
    branches:
      - main
      - master

jobs:
  publish-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize image names
        id: image-names
        run: |
          app_image="ghcr.io/${{ github.repository }}"
          web_image="ghcr.io/${{ github.repository }}-web"
          echo "app_image=${app_image,,}" >> "$GITHUB_OUTPUT"
          echo "web_image=${web_image,,}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image-names.outputs.app_image }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Extract web metadata
        id: web-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image-names.outputs.web_image }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: ${{ steps.web-meta.outputs.tags }}
          labels: ${{ steps.web-meta.outputs.labels }}

      - name: Validate deploy secrets
        run: |
          test -n "${{ secrets.DEPLOY_HOST }}" || (echo "Missing DEPLOY_HOST secret" && exit 1)
          test -n "${{ secrets.DEPLOY_USER }}" || (echo "Missing DEPLOY_USER secret" && exit 1)
          test -n "${{ secrets.DEPLOY_KEY }}" || (echo "Missing DEPLOY_KEY secret" && exit 1)
          test -n "${{ secrets.DEPLOY_APP_DIR }}" || (echo "Missing DEPLOY_APP_DIR secret" && exit 1)

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            export IMAGE_TAG=${{ github.sha }}
            export APP_IMAGE=${{ steps.image-names.outputs.app_image }}
            export WEB_IMAGE=${{ steps.image-names.outputs.web_image }}
            export APP_DIR=${{ secrets.DEPLOY_APP_DIR }}
            sh ${{ secrets.DEPLOY_APP_DIR }}/deploy.sh

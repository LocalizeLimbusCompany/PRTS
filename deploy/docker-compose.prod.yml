services:
  edge:
    image: nginx:1.29-alpine
    restart: unless-stopped
    ports:
      - "${EDGE_PORT:-18000}:18000"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web

  web:
    image: ${WEB_IMAGE:-prts-web-local}:${APP_IMAGE_TAG:-latest}
    restart: unless-stopped

  api:
    image: ${APP_IMAGE:-prts-backend-local}:${APP_IMAGE_TAG:-latest}
    command: ["prts-api"]
    user: "${APP_UID:-1000}:${APP_GID:-1000}"
    restart: unless-stopped
    env_file:
      - ../.env
    volumes:
      - /opt/prts-translation-system/exports:/app/exports
      - /opt/prts-translation-system/uploads:/app/uploads
    depends_on:
      - postgres
      - redis

  worker:
    image: ${APP_IMAGE:-prts-backend-local}:${APP_IMAGE_TAG:-latest}
    command: ["prts-worker"]
    user: "${APP_UID:-1000}:${APP_GID:-1000}"
    restart: unless-stopped
    env_file:
      - ../.env
    volumes:
      - /opt/prts-translation-system/exports:/app/exports
      - /opt/prts-translation-system/uploads:/app/uploads
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: prts_translation_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /opt/prts-translation-system/postgres:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    volumes:
      - /opt/prts-translation-system/redis:/data
